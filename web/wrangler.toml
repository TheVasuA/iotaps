# Cloudflare Pages configuration for IoTAPS frontend SPA.
# Deploy with: npx wrangler pages deploy dist --project-name iotaps-web
#
# The SPA is served globally from Cloudflare's edge CDN. API and WebSocket
# requests are routed to your VPS origin via _redirects / proxy rules.

name = "iotaps-web"
compatibility_date = "2024-11-01"

[site]
bucket = "./dist"

# Pages-specific settings (not all wrangler features apply to Pages projects,
# but this file documents the intent and is used by `wrangler pages` commands).
