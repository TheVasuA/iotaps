# IoTAPS Mosquitto Configuration - Production (tuned for 10,000 connections)
# Listens on 1883 (MQTT) and 9001 (WebSocket for browser clients)

persistence true
persistence_location /mosquitto/data/
log_dest stdout
# Reduced log verbosity at scale — "all" floods logs with 10k connections.
log_type error
log_type warning
log_type notice
connection_messages false

# MQTT listener - devices connect here
listener 1883 0.0.0.0
protocol mqtt
allow_anonymous true

# WebSocket listener - browser MQTT clients
listener 9001 0.0.0.0
protocol websockets
allow_anonymous true

# ---------------------------------------------------------------------------
# Scale tuning (10,000+ concurrent connections)
# ---------------------------------------------------------------------------
# Unlimited connections (bounded only by OS file descriptors — raise ulimit).
max_connections -1

# Keep alive — devices negotiate; cap prevents zombie connections lingering.
max_keepalive 120

# Per-client inflight QoS>0 messages (backpressure cap).
max_inflight_messages 100

# Queue messages for disconnected persistent-session clients (capped).
max_queued_messages 1000

# Limit message size to prevent memory abuse (256KB is generous for telemetry).
message_size_limit 262144

# Persistent client expiry — drop offline persistent sessions after 7 days so
# their queued messages don't accumulate forever.
persistent_client_expiration 7d

# Sys interval — broker stats published to $SYS every 10s (for monitoring).
sys_interval 10
