# IoTAPS Mosquitto broker baseline (Req 3.4, 3.5)
#
# Per-org authentication and ACL are enforced by the `mosquitto-go-auth`
# plugin using its HTTP backend, which calls the FastAPI auth endpoints. Those
# endpoints validate credentials against the `devices` / `mqtt_credentials`
# tables in Postgres and authorize topics against the per-org ACL pattern
# `iotaps/{org_id}/#` (Req 3.5). This config establishes the listeners,
# persistence, and the auth backend wiring; the FastAPI endpoints and
# credential provisioning are implemented in tasks 2.x / 4.x.
#
# Run with the `iegomez/mosquitto-go-auth` image (see docker-compose.yml),
# which ships the plugin at /mosquitto/go-auth.so.

persistence true
persistence_location /mosquitto/data/
log_dest stdout

# --- Listeners -------------------------------------------------------------
# MQTT over TCP (devices)
listener 1883
protocol mqtt

# MQTT over WebSockets (browser-based clients / simulator bridge)
listener 9001
protocol websockets

# --- Authentication --------------------------------------------------------
# Anonymous access disabled - all clients must authenticate with per-org
# credentials issued at device provisioning (Req 5.1).
allow_anonymous false

# Load the mosquitto-go-auth plugin. Mosquitto 2.x uses `plugin`; the image
# also accepts the legacy `auth_plugin` directive for the same .so.
plugin /mosquitto/go-auth.so

# Use only the HTTP backend; the FastAPI service is the source of truth for
# credentials and ACLs (which it derives from Postgres).
auth_opt_backends http

# Cache auth/acl decisions in-broker to avoid an HTTP round-trip per message.
auth_opt_cache true
auth_opt_cache_type go-cache
auth_opt_auth_cache_seconds 60
auth_opt_acl_cache_seconds 60

# Hashing scheme for any plugin-side checks (FastAPI returns allow/deny).
auth_opt_hasher bcrypt

# --- HTTP backend: points at the FastAPI auth endpoints --------------------
# The FastAPI service is reachable as `fastapi-api:8000` on the compose network.
# These three routes implement the go-auth HTTP contract:
#   POST {prefix}/user  -> 200 if username/password valid for the device
#   POST {prefix}/acl   -> 200 if the username may pub/sub the requested topic
#   POST {prefix}/superuser -> 200 only for privileged backend credentials
# Each returns JSON {"Ok": true|false, "Error": ""} (go-auth `jsonResponse`).
auth_opt_http_host fastapi-api
auth_opt_http_port 8000
auth_opt_http_method POST
auth_opt_http_response_mode json
auth_opt_http_getuser_uri /api/v1/mqtt/auth/user
auth_opt_http_aclcheck_uri /api/v1/mqtt/auth/acl
auth_opt_http_superuser_uri /api/v1/mqtt/auth/superuser

# ACL access semantics: the FastAPI /acl endpoint receives the requested topic
# plus the access level (1=read/subscribe, 2=write/publish, 4=subscribe) and
# checks it against the org's `iotaps/{org_id}/#` pattern (Req 3.5).
