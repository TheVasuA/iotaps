# IoTAPS Mosquitto Configuration - Production
# Listens on 1883 (MQTT) and 9001 (WebSocket for browser clients)

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type all
connection_messages true

# MQTT listener - devices connect here
listener 1883 0.0.0.0
protocol mqtt
allow_anonymous true

# WebSocket listener - browser MQTT clients
listener 9001 0.0.0.0
protocol websockets
allow_anonymous true

# Max connections (adjust for scale)
max_connections -1

# Keep alive (default 60s, clients can negotiate lower)
max_keepalive 120
