# IoTAPS Nginx base configuration (Req 32.3)
# Reverse proxy with SSL fronting the React SPA, REST API, and WebSocket gateway.
# Cloudflare sits in front of this for CDN/DNS/DDoS (Req 32.4).

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml;

    # Upstream FastAPI application (REST + WebSocket)
    upstream iotaps_api {
        server fastapi-api:8000;
    }

    # WebSocket connection upgrade mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Site server blocks (iotaps.conf) and the Cloudflare real-IP restoration
    # (cloudflare-realip.conf, http-context directives) are loaded here.
    include /etc/nginx/conf.d/*.conf;
}
