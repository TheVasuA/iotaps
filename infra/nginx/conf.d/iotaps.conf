# IoTAPS — HTTP only (add SSL later with certbot)
# Primary server: serves SPA + proxies API/WS (direct VPS access fallback)
server {
    listen 80;
    server_name iotaps.com www.iotaps.com;

    client_max_body_size 25m;
    root /usr/share/nginx/html;
    index index.html;

    # Health check
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # REST API
    location /api/ {
        proxy_pass http://iotaps_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket — routed to dedicated WS service (port 8001)
    location /ws {
        proxy_pass http://iotaps_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static assets (hashed, cache forever)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — never cache so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}

# API-only server: used when Cloudflare Pages proxies /api/* and /ws to this VPS.
# DNS: api.iotaps.com -> VPS IP (DNS only, grey cloud — direct SSL via certbot)
server {
    listen 80;
    server_name api.iotaps.com;
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.iotaps.com;

    ssl_certificate /etc/nginx/certs/api.iotaps.com.crt;
    ssl_certificate_key /etc/nginx/certs/api.iotaps.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 25m;

    # CORS headers for cross-origin requests from iotaps.com
    add_header Access-Control-Allow-Origin "https://iotaps.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Health check
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # REST API
    location /api/ {
        proxy_pass http://iotaps_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket — dedicated service
    location /ws {
        proxy_pass http://iotaps_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Reject everything else
    location / {
        return 404;
    }
}
