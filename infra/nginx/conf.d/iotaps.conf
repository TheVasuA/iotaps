# IoTAPS site server blocks (Req 32.3, 32.4)
# HTTP -> HTTPS redirect, plus the SSL server serving SPA + REST API + WebSocket.
# Cloudflare (CDN/DNS/DDoS) sits in front; real visitor IPs are restored in
# cloudflare-realip.conf so downstream services and IP blocking see the true client.

server {
    listen 80;
    server_name _;

    # Cloudflare terminates TLS at the edge and re-requests over HTTPS to the
    # origin; this redirect covers any direct/origin HTTP that slips through.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Certificates: use a Cloudflare Origin Certificate (recommended with the
    # orange-cloud proxy) or a Let's Encrypt cert. Mounted read-only from
    # infra/nginx/certs (see infra/README.md "TLS certificates").
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (HSTS assumes Cloudflare Full/Strict TLS mode).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow firmware/CSV uploads and large telemetry batches.
    client_max_body_size 25m;

    # React SPA static assets
    root /usr/share/nginx/html;
    index index.html;

    # Lightweight liveness endpoint for smoke tests / Cloudflare health checks.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # REST API -> FastAPI (versioned under /api/v1)
    location /api/ {
        proxy_pass http://iotaps_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket gateway -> FastAPI (JWT-authenticated, bridges Redis pub/sub)
    location /ws {
        proxy_pass http://iotaps_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived live-telemetry connections.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Cache hashed static assets aggressively; Cloudflare caches at the edge too.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
